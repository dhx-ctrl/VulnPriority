services:
  backend-ai:
    build:
      context: ./backend-ai
      dockerfile: Dockerfile
    container_name: vulnpriority-backend
    restart: unless-stopped
    env_file:
      - path: ./backend-ai/.env
        required: false
    ports:
      - "8000:8000"
    volumes:
      - vulnpriority_db:/app/data
    extra_hosts:
      - "host.docker.internal:host-gateway"

  frontend-dashboard:
    build:
      context: ./frontend-dashboard
      dockerfile: Dockerfile
    container_name: vulnpriority-frontend
    restart: unless-stopped
    depends_on:
      - backend-ai
    ports:
      - "5173:80"

volumes:
  vulnpriority_db: