<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VulnPriority AI — DevSecOps Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; overflow: hidden; }
    :root {
      --font-sans: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      --font-mono: 'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, monospace;
      --accent: #4f7df3;
      --accent-deep: #2f5fd6;
      --crit: #e0364c;
      --high: #ef7a3c;
      --med:  #d6a312;
      --low:  #25a36b;
      --ok:   #16a571;
    }
    [data-theme="light"] {
      --bg:          #f4f6fb;
      --bg-soft:     #eef1f8;
      --surface:     #ffffff;
      --surface-2:   #fafbfd;
      --text:        #0b1220;
      --text-soft:   #475569;
      --text-muted:  #8493a8;
      --border:      rgba(15,23,42,0.08);
      --border-soft: rgba(15,23,42,0.05);
      --shadow-sm:   0 1px 2px rgba(15,23,42,0.04), 0 1px 1px rgba(15,23,42,0.03);
      --shadow-md:   0 4px 16px -4px rgba(15,23,42,0.08), 0 1px 3px rgba(15,23,42,0.05);
      --shadow-lg:   0 24px 48px -16px rgba(15,23,42,0.14), 0 2px 6px rgba(15,23,42,0.05);
    }
    [data-theme="dark"] {
      --bg:          #070b14;
      --bg-soft:     #0a1020;
      --surface:     #0f1626;
      --surface-2:   #131c30;
      --text:        #e6ecf5;
      --text-soft:   #98a8c0;
      --text-muted:  #5b6e8c;
      --border:      rgba(255,255,255,0.07);
      --border-soft: rgba(255,255,255,0.04);
      --shadow-sm:   0 1px 2px rgba(0,0,0,0.3);
      --shadow-md:   0 8px 24px -6px rgba(0,0,0,0.5);
      --shadow-lg:   0 24px 48px -16px rgba(0,0,0,0.6);
    }

    body {
      font-family: var(--font-sans);
      font-feature-settings: 'cv11','ss01','ss03';
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      background: var(--bg);
      color: var(--text);
      transition: background 0.3s, color 0.3s;
      letter-spacing: -0.005em;
    }
    #root { height: 100%; }

    /* Refined scrollbar */
    ::-webkit-scrollbar { width: 10px; height: 10px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb {
      background: rgba(100,116,139,0.18);
      border-radius: 10px;
      border: 2px solid transparent;
      background-clip: content-box;
    }
    ::-webkit-scrollbar-thumb:hover { background: rgba(100,116,139,0.35); background-clip: content-box; border: 2px solid transparent; }

    /* Selection */
    ::selection { background: rgba(79,125,243,0.22); color: inherit; }

    /* Focus */
    input:focus, select:focus, textarea:focus { outline: none; }
    input, select, textarea, button { font-family: inherit; }

    /* Mono numbers everywhere they matter */
    .num { font-variant-numeric: tabular-nums; font-feature-settings: 'tnum'; }

    /* Main scrollable area */
    main { overflow-y: auto !important; max-height: calc(100vh - 60px); scroll-behavior: smooth; }
    main > * { animation: pageEnter 0.32s cubic-bezier(0.2, 0.7, 0.2, 1) both; }

    /* Ripple */
    @keyframes ripple {
      0% { width: 0; height: 0; opacity: 0.6; }
      100% { width: 320px; height: 320px; opacity: 0; }
    }

    /* Page enter */
    @keyframes pageEnter {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Card stagger entry */
    @keyframes cardIn {
      from { opacity: 0; transform: translateY(4px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .card-in { animation: cardIn 0.36s cubic-bezier(0.2, 0.7, 0.2, 1) both; }

    /* Hover lift for interactive cards */
    .lift { transition: transform 0.18s ease, box-shadow 0.18s ease, border-color 0.18s ease; }
    .lift:hover { transform: translateY(-2px); box-shadow: var(--shadow-md); }

    /* Pulse for live dots */
    @keyframes pulseDot {
      0%, 100% { box-shadow: 0 0 0 0 rgba(22,165,113,0.45); }
      50%      { box-shadow: 0 0 0 6px rgba(22,165,113,0); }
    }
    .pulse-dot { animation: pulseDot 1.8s ease-in-out infinite; }

    /* Spinner */
    @keyframes spin { to { transform: rotate(360deg); } }
    .spin { animation: spin 1s linear infinite; }

    /* Skeleton shimmer */
    @keyframes shimmer { 0% { background-position: -200% 0; } 100% { background-position: 200% 0; } }
    .shimmer {
      background: linear-gradient(90deg, transparent, rgba(100,116,139,0.08), transparent);
      background-size: 200% 100%;
      animation: shimmer 1.6s linear infinite;
    }

    /* Recharts tooltip */
    .recharts-tooltip-wrapper { z-index: 100; }
    .recharts-default-tooltip {
      border-radius: 10px !important;
      border: 1px solid var(--border) !important;
      box-shadow: var(--shadow-md) !important;
      padding: 8px 12px !important;
    }

    /* Table row hover (subtle) */
    tbody tr.tr-hover:hover { background: var(--bg-soft) !important; }

    /* Button hover */
    button { cursor: pointer; }
    button:disabled { cursor: not-allowed; }

    /* Tighter h1 across pages */
    h1, h2, h3, h4 { letter-spacing: -0.022em; }
  </style>
</head>
<body>
  <div id="root"></div>

  <!-- React -->
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <!-- Recharts -->
  <script src="https://unpkg.com/prop-types@15.8.1/prop-types.min.js"></script>
  <script src="https://unpkg.com/recharts@2.15.3/umd/Recharts.js"></script>

  <!-- App scripts -->
  <script src="src/mock-data.js"></script>
  <script src="src/api-client.js"></script>
  <script type="text/babel" src="src/context.jsx"></script>
  <script type="text/babel" src="src/login-page.jsx"></script>
  <script type="text/babel" src="src/layout.jsx"></script>
  <script type="text/babel" src="src/dashboard-page.jsx"></script>
  <script type="text/babel" src="src/findings-page.jsx"></script>
  <script type="text/babel" src="src/scan-history-page.jsx"></script>
  <script type="text/babel" src="src/model-insights-page.jsx"></script>
  <script type="text/babel" src="src/parameters-page.jsx"></script>
  <script type="text/babel" src="src/sync-page.jsx"></script>
  <script type="text/babel" src="src/summary-page.jsx"></script>
  <script type="text/babel" src="src/app.jsx"></script>
</body>
</html>
