name: VulnPriority CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  frontend-build:
    name: Frontend build
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ci-cd-security/frontend-dashboard

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: ci-cd-security/frontend-dashboard/package-lock.json

      - name: Install frontend dependencies
        run: npm ci --no-audit --no-fund

      - name: Check Vite installation
        run: |
          npm list vite
          ls -la node_modules/.bin | grep vite

      - name: Build React dashboard
        run: npm run build

  backend-tests:
    name: Backend smoke tests
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ci-cd-security/backend-ai

    env:
      DASHBOARD_USERNAME: admin
      DASHBOARD_PASSWORD: Admin123!
      API_AUTH_TOKEN: test-api-token
      DEFECTDOJO_URL: http://127.0.0.1:8080
      DEFECTDOJO_API_KEY: dummy-test-key
      DEFECTDOJO_PRODUCT_ID: ""
      DASHBOARD_ORIGINS: "http://127.0.0.1:5173,http://localhost:5173,http://127.0.0.1:5500,http://localhost:5500"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install backend test dependencies
        run: python -m pip install -r requirements-dev.txt

      - name: Run backend smoke tests
        run: python -m pytest -q tests

  docker-compose-check:
    name: Docker Compose validation
    runs-on: ubuntu-latest
    needs:
      - frontend-build
      - backend-tests

    env:
      CI_DASHBOARD_USERNAME: ${{ secrets.DASHBOARD_USERNAME }}
      CI_DASHBOARD_PASSWORD: ${{ secrets.DASHBOARD_PASSWORD }}
      CI_API_AUTH_TOKEN: ${{ secrets.API_AUTH_TOKEN }}
      CI_DEFECTDOJO_URL: ${{ secrets.DEFECTDOJO_URL }}
      CI_DEFECTDOJO_API_KEY: ${{ secrets.DEFECTDOJO_API_KEY }}
      CI_DEFECTDOJO_PRODUCT_ID: ${{ secrets.DEFECTDOJO_PRODUCT_ID }}
      CI_DASHBOARD_ORIGINS: "http://127.0.0.1:5173,http://localhost:5173,http://127.0.0.1:5500,http://localhost:5500"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build frontend dist for Docker context
        working-directory: ci-cd-security/frontend-dashboard
        run: |
          npm ci --no-audit --no-fund
          npm run build
          test -d dist

      - name: Create backend .env for Docker Compose
        run: |
          cat > ci-cd-security/backend-ai/.env <<EOF
          DASHBOARD_USERNAME=${CI_DASHBOARD_USERNAME}
          DASHBOARD_PASSWORD=${CI_DASHBOARD_PASSWORD}
          API_AUTH_TOKEN=${CI_API_AUTH_TOKEN}
          DEFECTDOJO_URL=${CI_DEFECTDOJO_URL}
          DEFECTDOJO_API_KEY=${CI_DEFECTDOJO_API_KEY}
          DEFECTDOJO_PRODUCT_ID=${CI_DEFECTDOJO_PRODUCT_ID}
          DASHBOARD_ORIGINS=${CI_DASHBOARD_ORIGINS}
          AI_CLEAN_MODEL_DIR=model_output_FINAL_clean_minimal_features
          AI_RANKER_MODEL_DIR=model_output_EPSS_operational_ranker
          EOF

      - name: Validate Docker Compose file
        run: docker compose -f ci-cd-security/docker-compose.yml config

      - name: Build Docker images
        run: docker compose -f ci-cd-security/docker-compose.yml build