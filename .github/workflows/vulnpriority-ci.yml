name: VulnPriority CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  frontend-build:
    name: Frontend build
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ci-cd-security/frontend-dashboard

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install frontend dependencies
        run: |
          npm install --include=dev --no-audit --no-fund
          npm install vite@^8.0.0 @vitejs/plugin-react@latest --save-dev --no-audit --no-fund

      - name: Check Vite installation
        run: |
          npm list vite
          ls -la node_modules/.bin | grep vite

      - name: Build React dashboard
        run: ./node_modules/.bin/vite build

  backend-tests:
    name: Backend smoke tests
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ci-cd-security/backend-ai

    env:
      DASHBOARD_USERNAME: admin
      DASHBOARD_PASSWORD: Admin123!
      API_AUTH_TOKEN: test-api-token
      AI_API_KEY: test-api-token
      DEFECTDOJO_URL: http://127.0.0.1:8080
      DEFECTDOJO_API_KEY: dummy-test-key
      DEFECTDOJO_PRODUCT_ID: ""
      DASHBOARD_ORIGINS: http://127.0.0.1:5173,http://localhost:5173,http://127.0.0.1:5500,http://localhost:5500

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install backend test dependencies
        run: python -m pip install -r requirements-dev.txt

      - name: Run backend smoke tests
        run: python -m pytest -q tests

  docker-compose-check:
    name: Docker Compose validation
    runs-on: ubuntu-latest
    needs:
      - frontend-build
      - backend-tests

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate Docker Compose file
        run: docker compose -f ci-cd-security/docker-compose.yml config

      # The frontend Dockerfile serves a prebuilt dist/ folder.
      # Therefore the workflow builds the frontend first, then checks that dist exists.
      - name: Build frontend dist for Docker context
        working-directory: ci-cd-security/frontend-dashboard
        run: |
          npm install --include=dev --no-audit --no-fund
          npm install vite@^8.0.0 @vitejs/plugin-react@latest --save-dev --no-audit --no-fund
          ./node_modules/.bin/vite build
          test -d dist

      - name: Build Docker images
        run: docker compose -f ci-cd-security/docker-compose.yml build